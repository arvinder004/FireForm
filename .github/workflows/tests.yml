name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Verify imports
        run: |
          python -c "from src.input_manager import InputManager; print('✅ InputManager imported')"
          python -c "from src.json_manager import JsonManager; print('✅ JsonManager imported')"
          python -c "from src.backend import Fill; print('✅ Backend imported')"
          echo "✅ All imports successful"